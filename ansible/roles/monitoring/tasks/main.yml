- name: Download Elastic Agent
  ansible.builtin.get_url:
    url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    dest: "/tmp/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    mode: "0644"
  when: ansible_facts['architecture'] == 'x86_64'
  tags: [monitoring]

- name: Extract Elastic Agent
  ansible.builtin.unarchive:
    src: "/tmp/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    dest: /opt
    remote_src: true
    creates: "/opt/elastic-agent-{{ elastic_agent_version }}-linux-x86_64"
  when: ansible_facts['architecture'] == 'x86_64'
  tags: [monitoring]

- name: Install Elastic Agent
  ansible.builtin.command:
    cmd: >
      /opt/elastic-agent-{{ elastic_agent_version }}-linux-x86_64/elastic-agent install
      --non-interactive
      --url="{{ fleet_server_url }}"
      --enrollment-token="{{ fleet_enrollment_token }}"
    creates: /opt/Elastic/Agent/elastic-agent
  when:
    - ansible_facts['architecture'] == 'x86_64'
    - fleet_server_url | length > 0
    - fleet_enrollment_token | length > 0
  tags: [monitoring]

- name: Ensure elastic-agent service is running
  ansible.builtin.service:
    name: elastic-agent
    state: started
    enabled: true
  when:
    - ansible_facts['architecture'] == 'x86_64'
    - fleet_server_url | length > 0
  tags: [monitoring]
