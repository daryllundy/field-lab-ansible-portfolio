---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'
  tags: [packages]

- name: Install group-specific packages
  ansible.builtin.package:
    name: "{{ packages_extra }}"
    state: present
  when: packages_extra | length > 0
  tags: [packages]
